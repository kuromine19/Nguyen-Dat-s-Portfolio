{%extends 'base/base.html'%}
{%load static%}
{%block title%}Home{%endblock%}

{%block slider%}
    <div id="carouselExampleIndicators" class="carousel slide" data-bs-ride="carousel" style="position:relative">
        <ol class="carousel-indicators" style="font-size:0">
            <li data-bs-target="#carouselExampleIndicators" data-bs-slide-to="0" class="active"></li>
            <li data-bs-target="#carouselExampleIndicators" data-bs-slide-to="1"></li>
            <li data-bs-target="#carouselExampleIndicators" data-bs-slide-to="2"></li>
        </ol>

        <div class="carousel-inner">
            {%for object in obj%}
            <div class="carousel-item {%if forloop.counter0 == 0%} active {% endif %}">
                <img class="d-block w-100 h-15" src="{{object.image.url}}" style="width:100%;height:32rem;opacity: .6;">
                <div class="carousel-caption d-none d-md-block" style="font-family: 'Caprasimo', cursive;color:rgb(24, 51, 83)">
                    <h1 class="animate__animated animate__fadeInDown">{{object.title}}</h1>
                    <h3 class="animate__animated animate__zoomIn">{{object.sub_title}}</h3>

                </div>
            </div>
            {% endfor %}

        </div>

        <a class="carousel-control-prev" href="#carouselExampleIndicators" role="button" data-slide="prev" style="color:rgb(24, 51, 83)">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
        
        </a>

        <a class="carousel-control-next" href="#carouselExampleIndicators" role="button" data-slide="next" style="color:rgb(24, 51, 83)">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            
        </a>
        
    </div>
    <div class="container" style="font-family: 'Oswald', sans-serif;padding:20px;color:#3a77a3">            
        <center>
            <h1>Mine Rua's Portfolio</h1>
        </center>
    </div>
{%endblock%}
