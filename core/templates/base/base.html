<!DOCTYPE html>
<html lang="en">
<head>
    {%load static%}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{%static 'css/bootstrap.min.css'%}" type="text/css"/>
    <script src="{%static 'js/nav.js'%}"></script>
    <script src="https://code.jquery.com/jquery-3.5.1.js"></script>
    <script src="https://code.jquery.com/jquery-3.4.1.slim.min.js" integrity="sha384-J6qa4849blE2+poT4WnyKhv5vZF5SrPo0iEjwBvKU7imGFAV0wwj1yYfoRSJoZ+n" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js" integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/js/bootstrap.min.js" integrity="sha384-wfSDF2E50Y2D1uUdj0O3uMBJnjuUD4Ih7YwaYd1iqfktj0Uod8GCExl3Og8ifwB6" crossorigin="anonymous"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Caprasimo&family=Oswald:wght@500&family=Poppins&display=swap" rel="stylesheet">
    <title>{%block title%}{%endblock%}</title>

    <style>
        
        body{
            height:100vh;
            background-color: #000;
            background: url("{%static 'images/bg3.jpg'%}") no-repeat fixed;
            background-position: center;
            -webkit-background-size: cover;
            -moz-background-size: cover;
            -o-background-size: cover;
            background-size: cover;
        
            -webkit-animation: myfirst 5s ; /* Chrome, Safari, Opera */
            animation: myfirst 5s ;
          }
        
          /* Chrome, Safari, Opera */
        @-webkit-keyframes myfirst {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
    
        /* Standard syntax */
        @keyframes myfirst {
            from {opacity: 0.2;}
            to {opacity: 1;}
          
        }

        .navbar-nav li a {
            color:#CBE4DE;
        }
        :root {
            --color-highlight: 0, 0, 0;
        }
    
          
        .nav-item:hover {
            background-color: rgba(var(--color-highlight), 0.4);
        }
    
        .nav-item .nav-link:hover,
        .nav-item .nav-link.active{
            color:aqua;
            text-shadow: 0 0 3px #0E8388,
            0 0 6px #0E8388,
            0 0 9px #0E8388,
            0 0 12px #0E8388,
            0 0 18px #0E8388;
            opacity:0.9;
            border-bottom: 2px solid #0E8388;
        }
        

        .navbar-text{
            color:#CBE4DE;
            font-size:16px;
            font-family:'Oswald',san-serif;
            text-shadow: 0 0 3px #0E8388,
            0 0 6px #0E8388,
            0 0 9px #0E8388,
            0 0 12px #0E8388,
            0 0 18px #0E8388;

        }
        
        .navbar-slogan{
            display:flex;
        }

    </style>
</head>
<body>
    <div class="container-fluid">
        <nav class="navbar navbar-expand-lg navbar-light bg-light bg-transparent">
            <a class="navbar-brand" href="/">
                <img src='{%static "images/logo.png"%}' alt="Logo" style="padding-left:1rem;width:70px;height:50px;">
            </a>
            <span class="navbar-text">
                PORTFOLIO
                <span class="navbar-slogan" style="color:#CBE4DE;font-size:11px;font-style:italic;font-family:'Poppins',san-serif;">
                    small steps every day
                </span>
            </span>
            <ul class="navbar-nav ms-auto" style="padding-right:10px">
                <li class="nav-item rounded"><a class="nav-link px-3 {% if navbar == 'home' %} active {% endif %}" href="/">Home</a></li>
                <li class="nav-item rounded"><a class="nav-link px-3 {% if navbar == 'about' %} active {% endif %}" href="/about">About</a></li>
                <li class="nav-item rounded"><a class="nav-link px-3 {% if navbar == 'dashboard' %} active {% endif %}" href="/dashboard">Dashboard</a></li>
                <li class="nav-item rounded"><a class="nav-link px-3 {% if navbar == 'blog' %} active {% endif %}" href="/blog">Blog</a></li>
                <li class="nav-item rounded"><a class="nav-link px-3 {% if navbar == 'contact' %} active {% endif %}" href="/contact">Contact</a></li>
            </ul>
        </nav>
    </div>
    {%block collapse_navbar%}

    {%endblock%}

    <!-- {%block slider%}
    
    {%endblock%} -->

    {%block dashboard%}

    {%endblock%}



</body>
</html>
